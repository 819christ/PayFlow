<!-- seed_rules.html — Ouvrir une fois dans le navigateur pour pré-charger les règles validées -->
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>PayFlow — Seed Règles</title>
<style>
  body { font-family: sans-serif; padding: 40px; background: #F0F4FF; }
  .ok { color: #16A34A; font-weight: bold; }
  .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  pre { background: #f8f8f8; padding: 12px; border-radius: 8px; overflow: auto; font-size: 12px; }
  button { background: #1A56DB; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 16px; }
</style>
</head>
<body>
<h1>🚀 PayFlow — Injection des règles testées</h1>

<div class="card">
  <h3>📋 Règles à injecter</h3>
  <pre id="preview"></pre>
  <button onclick="seedRules()">✅ Injecter dans PayFlow</button>
  <p id="status"></p>
</div>

<script>
const RULES = [
  {
    name: "SMS Dépôt",
    keywords: "Depot.recu",
    senderFilter: "",
    enabled: true,
    nodes: [
      { type: "between", target: "amount",      val1: "recu ",   val2: "F de"   },
      { type: "between", target: "senderName",  val1: "F de ",   val2: " ("     },
      { type: "between", target: "senderPhone", val1: "(",       val2: " -"     },
      { type: "between", target: "txId",        val1: "ID:",     val2: "Frais"  }
    ]
  },
  {
    name: "SMS Transfert",
    keywords: "Transfert",
    senderFilter: "",
    enabled: true,
    nodes: [
      { type: "between", target: "amount",      val1: "Transfert ", val2: "F de" },
      { type: "between", target: "senderName",  val1: "F de ",      val2: " ("   },
      { type: "between", target: "senderPhone", val1: "(",          val2: ")"    },
      { type: "after",   target: "txId",        val1: "ID:",        val2: ""     }
    ]
  }
];

document.getElementById('preview').textContent = JSON.stringify(RULES, null, 2);

function seedRules() {
  // PayFlow utilise la clé "payflow:sms_rules"
  localStorage.setItem('payflow:sms_rules', JSON.stringify(RULES));
  document.getElementById('status').innerHTML = '✅ <span class="ok">Règles injectées ! Vous pouvez fermer cette page et ouvrir PayFlow.</span>';
  setTimeout(() => window.location.href = 'index.html', 1500);
}
</script>
</body>
</html>
